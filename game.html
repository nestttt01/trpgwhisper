<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANKO - 宮崎教練· FF攻略系統 (高級日系版)</title>
    <style>
        /* 定義高級日系無彩度黑灰白變數 */
        :root {
            --accent-white: #ffffff; /* 外框白光核心 */
            --accent-glow: rgba(255, 255, 255, 0.5); /* 外框白光擴散 */
            --bg-dark: #050505; /* 極致深黑背景 */
            --card-bg: rgba(12, 12, 12, 0.95); /* 半透明黑底 */
            --border-gray: #333333; /* 邊框暗灰 */
            
            /* --- 妳專屬的日系高級灰設定 --- */
            --msg-light-gray: #EAEAEA; /* 對話框：非常淡的優雅灰色 */
            --text-black: #111111; /* 內文字體：極深黑色 */
            --text-glow-black: 0 0 6px rgba(0, 0, 0, 0.35); /* 字體黑色光暈感 */
            
            --text-sub: #888888; /* 系統與玩家次要文字 */
            
            /* 外框統一光暈 */
            --glow-shadow: 0 0 15px var(--accent-glow);
            --glow-shadow-hover: 0 0 25px rgba(255, 255, 255, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-dark); color: var(--accent-white); display: flex; justify-content: center; align-items: center; }

        /* 初始設定畫面 */
        #setup-screen { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: all 0.3s; }
        #setup-pic { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-white); filter: grayscale(100%); margin-bottom: 25px; cursor: pointer; box-shadow: var(--glow-shadow); transition: box-shadow 0.3s; }
        #setup-pic:hover { box-shadow: var(--glow-shadow-hover); }

        .key-input, .model-select { background: rgba(255,255,255,0.03); border: 1px solid var(--border-gray); padding: 14px; border-radius: 12px; color: #fff; width: 100%; max-width: 400px; text-align: center; font-size: 14px; margin-bottom: 15px; transition: all 0.3s; }
        .key-input:focus, .model-select:focus { border-color: var(--accent-white); outline: none; box-shadow: 0 0 10px rgba(255,255,255,0.2); }

        .model-select { cursor: pointer; width: 100%; appearance: none; -webkit-appearance: none; }
        .model-select option { background: #111; color: #fff; }
        
        #model-selection-area { display: none; width: 100%; max-width: 400px; text-align: center; }
        .action-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        
        #test-btn { border-color: #666; color: #aaa; }
        #test-btn:hover { border-color: var(--accent-white); color: #fff; background: rgba(255,255,255,0.05); }

        #clear-save { background: rgba(255, 0, 0, 0.05); border-color: rgba(255,50,50,0.3); color: rgba(255,150,150,0.8); }
        #clear-save:hover { background: rgba(255, 0, 0, 0.1); border-color: rgba(255,50,50,0.6); color: rgba(255,150,150,1); }

        /* 遊戲主畫面：保留光暈外框 */
        #game-container {
            width: 100%; max-width: 950px; height: 100%; max-height: 850px;
            background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--accent-white); border-radius: 16px;
            display: flex; flex-direction: column; justify-content: space-between; padding: 30px;
            box-shadow: var(--glow-shadow); display: none; transition: all 0.3s;
        }

        #status-bar { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-gray); padding-bottom: 15px; font-size: 13px; color: var(--text-sub); letter-spacing: 1px; }
        .white-accent { color: var(--accent-white); font-weight: 600; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .status-group { display: flex; gap: 25px; }

        /* 聊天對話區域 */
        #dialogue-box { background: transparent; padding: 10px 5px; margin: 20px 0; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
        
        .msg-container { display: flex; flex-direction: column; gap: 8px; animation: fadeIn 0.4s ease-out; }
        
        /* 名字標籤：宮崎三高為純白光暈 */
        .msg-speaker { font-size: 13px; color: #fff; font-weight: bold; border-left: 2px solid var(--accent-white); padding-left: 10px; text-shadow: 0 0 5px rgba(255,255,255,0.5); letter-spacing: 1px; }
        
        /* --- 核心升級：高級日系淺灰大框 ＋ 黑色光暈字體 --- */
        .msg-text { 
            background-color: var(--msg-light-gray); 
            color: var(--text-black); 
            text-shadow: var(--text-glow-black); 
            
            padding: 18px 24px; 
            border-radius: 12px; 
            font-size: 15px; 
            line-height: 1.8; 
            white-space: pre-line;
            max-width: 88%; 
            align-self: flex-start; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); /* 讓淺灰框有立體浮空感 */
        }
        
        /* 玩家發言樣式：與 AI 區隔，採用極簡空心黑底框，靠右 */
        .msg-container.player .msg-text { 
            align-self: flex-end; 
            background-color: transparent; 
            border: 1px solid var(--border-gray);
            color: #d0d0d0; 
            text-shadow: none; 
            box-shadow: none;
            border-radius: 12px;
        }
        .msg-container.player .msg-speaker { align-self: flex-end; color: var(--text-sub); border-left: none; border-right: 2px solid var(--border-gray); padding-left: 0; padding-right: 10px; text-shadow: none; }

        .system-msg { color: #555; text-align: center; font-style: italic; font-size: 12px; padding: 15px 0; letter-spacing: 1px; }

        #input-area { display: flex; gap: 15px; border-top: 1px solid var(--border-gray); padding-top: 20px; align-items: flex-end; }
        
        #player-input { flex-grow: 1; background: rgba(255,255,255,0.02); border: 1px solid var(--border-gray); border-radius: 12px; padding: 14px; color: #fff; font-size: 15px; transition: all 0.3s; min-height: 48px; max-height: 150px; resize: none; overflow-y: auto; }
        #player-input:focus { border-color: var(--accent-white); outline: none; background: rgba(255,255,255,0.04); box-shadow: 0 0 10px rgba(255,255,255,0.15); }

        .btn { background: none; border: 1px solid var(--border-gray); color: var(--text-sub); padding: 14px 28px; border-radius: 12px; cursor: pointer; font-size: 14px; transition: all 0.3s; white-space: nowrap; letter-spacing: 1px; }
        .btn:hover { border-color: var(--accent-white); color: var(--accent-white); background: rgba(255,255,255,0.05); box-shadow: var(--glow-shadow); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .btn:disabled { border-color: #222 !important; color: #444 !important; cursor: not-allowed; transform: none; box-shadow: none !important; }
        
        #start-btn { border-color: var(--accent-white); color: var(--accent-white); box-shadow: 0 0 10px rgba(255,255,255,0.1); }
        #start-btn:hover { box-shadow: var(--glow-shadow-hover); }

        #loading { display: none; color: var(--text-sub); font-style: italic; font-size: 13px; text-align: center; padding: 15px 0; animation: pulse 1.5s infinite; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        
        /* 手機 RWD 優化 */
        @media screen and (max-width: 600px) {
            #game-container { border-radius: 0; padding: 20px 15px; border-left: none; border-right: none; box-shadow: none; }
            #status-bar { font-size: 12px; flex-direction: column; gap: 10px; align-items: center; }
            .status-group { gap: 15px; }
            .msg-text { max-width: 95%; padding: 15px; font-size: 14px; }
            #input-area { padding-top: 15px; gap: 10px; }
            #player-input { padding: 12px; font-size: 14px; }
            .btn { padding: 12px 20px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <img id="setup-pic" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" title="https://pbs.twimg.com/media/HK84gnXaIAAMiNU?format=jpg&name=4096x4096" onclick="document.getElementById('pic-input').click();">
        <input type="file" id="pic-input" accept="image/*" style="display:none" onchange="loadPic(this)">
        
        <h2 style="color: #fff; letter-spacing: 2px; font-size: 1.3rem; margin-bottom: 8px; text-shadow: 0 0 10px rgba(255,255,255,0.5);">宮崎教練· FF攻略系統</h2>
        <p style="color: var(--text-sub); text-align: center; font-size: 12px; margin-bottom: 25px; letter-spacing: 2px;"> a c h r o m a t o p s i a </p>
        
        <input type="password" id="api-key" class="key-input" placeholder="請貼上你的 API Key">
        <button class="btn" id="verify-btn" onclick="fetchAvailableModels()">1. 驗證金鑰</button>

        <div id="model-selection-area">
            <p style="color: var(--text-sub); font-size: 12px; margin-bottom: 12px;">驗證成功。請選擇核心：</p>
            <select id="model-choice" class="model-select"></select>
            
            <div class="action-buttons">
                <button class="btn" id="test-btn" onclick="testConnection()">2. 基礎連線測試</button>
                <button class="btn" id="start-btn" onclick="initGame()">3. 正式啟動 / 載入舊檔</button>
                <button class="btn" id="clear-save" onclick="clearSave()">清除回憶</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div id="status-bar">
            <div class="status-group">
                <div>TARGET: <span class="white-accent">宮崎三高</span></div>
                <div>目前好感度: <span id="ui-love" class="white-accent">20</span></div>
            </div>
            <div>當前 Token 消耗: <span id="ui-tokens" class="white-accent">0</span></div>
        </div>

        <div id="dialogue-box"></div>

        <div id="loading">宮崎教練 sedang menanggapi...</div>

        <div id="input-area">
            <textarea id="player-input" rows="1" placeholder="輸入妳想對他說的話..." onkeydown="checkInputKey(event)"></textarea>
            <button class="btn" id="send-btn" onclick="sendChoice()">發送</button>
        </div>
    </div>

    <script>
        let apiKey = "";
        let selectedModel = "";
        let lovePoints = 20;
        let chatScript = []; 

        window.onload = () => {
            const savedKey = localStorage.getItem('sanko_api_key');
            if (savedKey) { document.getElementById('api-key').value = savedKey; }
            const savedPic = localStorage.getItem('sanko_home_pic');
            if (savedPic) { document.getElementById('setup-pic').src = savedPic; }
            adjustInputHeight();
        }

        const systemInstruction = `
【任務指令】
你現在要在一個高級感的戀愛模擬器網頁中，扮演攻略對象「宮崎三高」。

【核心設定】
1. 外型：精靈族，面部有一道明顯的傷疤。穿著剪裁完美的黑西裝、黑領帶、黑手套。眼神冷冽銳利，整個人散發著強烈的禁慾感與頂級的壓迫感。
2. 身份：白天是頂級健身房教練，專門指導政商名流，說話注重效率與成果；晚上是 FFXIV 的硬核坦克（MT），掌控欲保護欲極強。
3. 說話風格與心理：平時言行沉穩、直白、不繞圈子。你是一個擁有正常生理與心理需求的成熟男性，但你選擇用極度的自律去克制它們。你的『禁慾感』源於這種刻意的自律，而非缺乏感情。你懂博弈，喜歡在對話中佔據主導權。
4. 反差萌：如果玩家表現出色、打動你、或是表現出對你特別的依賴，你會流露出極其細微的溫柔、佔有欲，甚至是醋意（你討厭她對其他坦克或他人表現出興趣）。這種情緒會因為你的禁慾習慣而變得特別有張力。能自然地應對中日文交雜的遊戲或健身用語。

【當下情境】
- 你們正在 FFXIV 零式高難副本招募板上初次相遇。玩家「小島秀芙」是剛進隊伍的補師（Healer）。

【遊戲規則】
- 根據下方的「對話紀錄」，即興生成一段包含宮崎三高【情境描述、動作、神態】以及【對話】的回應。
- 請注重角色行為的情感邏輯性，請參照真實人類相處的模式與玩家設定的角色互動。
- 你的動作描寫要配合當下情境氛圍。妳不能幫玩家預設台詞。回應格式：动作描述、台詞。
- 請在回應最後一行更新好感度（LOVE_CHANGE 由妳增減），格式嚴格：[LOVE_CHANGE: +5] 或 [LOVE_CHANGE: -5]
`;

        async function fetchAvailableModels() {
            apiKey = document.getElementById('api-key').value.trim();
            if(!apiKey) { alert("請貼上你的 API Key！"); return; }
            
            const verifyBtn = document.getElementById('verify-btn');
            verifyBtn.innerText = "驗證中...";
            verifyBtn.disabled = true;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await res.json();
                
                if (data.error) throw new Error("無效的金鑰或網路錯誤。");
                localStorage.setItem('sanko_api_key', apiKey);
                const select = document.getElementById('model-choice');
                select.innerHTML = ''; 
                
                const validModels = data.models.filter(m => 
                    m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent") &&
                    !m.name.includes("-tts") && !m.name.includes("-vision")
                );

                if(validModels.length === 0) throw new Error("無可用純文字模型。");

                validModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.name; opt.textContent = m.displayName || m.name;
                    if(m.name.includes('models/gemini-3.1-flash')) opt.selected = true;
                    select.appendChild(opt);
                });

                document.getElementById('model-selection-area').style.display = 'block';
                verifyBtn.style.display = 'none';
            } catch (error) {
                alert("QC 未通過：\n\n" + error.message);
                verifyBtn.innerText = "1. 驗證金鑰";
                verifyBtn.disabled = false;
            }
        }

        async function testConnection() {
            apiKey = localStorage.getItem('sanko_api_key');
            selectedModel = document.getElementById('model-choice').value;
            if(!apiKey || !selectedModel) return;
            
            const url = `https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`;
            const testBody = { contents: [{ role: "user", parts: [{ text: "測試連線。" }] }] };

            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(testBody) });
                const data = await response.json();
                if (data.error) throw new Error(JSON.stringify(data.error, null, 2));
                alert("連線成功！");
            } catch (error) { alert("連線失敗：\n\n" + error.message); }
        }

        function loadPic(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('setup-pic').src = e.target.result;
                    localStorage.setItem('sanko_home_pic', e.target.result); 
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function adjustInputHeight() {
            const input = document.getElementById('player-input');
            input.style.height = "auto";
            input.style.height = Math.min(input.scrollHeight, 150) + "px"; 
        }

        // --- 手機與電腦換行邏輯完美優化 ---
        function checkInputKey(e) {
            adjustInputHeight(); 
            
            // 判斷當前螢幕寬度，小於等於 600px 視為手機版
            const isMobile = window.innerWidth <= 600;
            
            if (!isMobile) {
                // 電腦版：按 Enter 直接送出，Shift+Enter 換行
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault(); 
                    sendChoice(); 
                }
            } else {
                // 手機版：按虛擬鍵盤的 Enter (Return) 就純粹換行。
                // 玩家必須「手動點擊螢幕上的發送按鈕」才能送出對話，絕對不會誤觸！
                // 不執行 e.preventDefault()，讓它自然換行。
            }
        }

        function initGame() {
            apiKey = localStorage.getItem('sanko_api_key');
            selectedModel = document.getElementById('model-choice').value;
            if(!apiKey || !selectedModel) { alert("請先驗證金鑰。"); return; }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            
            const savedChat = localStorage.getItem('sanko_chat_script');
            const savedLove = localStorage.getItem('sanko_chat_love');
            
            if (savedChat && savedChat.length > 0) {
                chatScript = JSON.parse(savedChat);
                chatScript.forEach(line => {
                    if (line.startsWith("妳：")) { appendMessage("妳", line.replace("妳：", "")); } 
                    else if (line.startsWith("宮崎三高：")) { appendMessage("宮崎三高", line.replace("宮崎三高：", "")); }
                });
                if (savedLove) {
                    lovePoints = parseInt(savedLove);
                    document.getElementById('ui-love').innerText = lovePoints;
                }
                const msgBox = document.getElementById('dialogue-box');
                const systemMsg = document.createElement('div');
                systemMsg.className = 'system-msg';
                systemMsg.innerText = "— 已載入無彩度回憶 —";
                msgBox.appendChild(systemMsg);
                msgBox.scrollTop = msgBox.scrollHeight;
            } else {
                const openingPersona = "【系統設定：妳的初次發言】(身為 MT，妳剛帶領隊伍排完機制，妳調整了一下黑手套，在隊伍頻道中冷淡地給出了第一句第一句發言)。注意：妳的回應格式必須是：(动作神态描述) 妳要說的話，不可以幫補師預設台詞。";
                callAI_Persona(openingPersona);
            }
            document.getElementById('player-input').focus();
        }

        function appendMessage(speaker, text) {
            const dialogueBox = document.getElementById('dialogue-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = speaker === "妳" ? 'msg-container player' : 'msg-container sanko';
            msgDiv.innerHTML = `<div class="msg-speaker">${speaker}</div><div class="msg-text">${text}</div>`;
            dialogueBox.appendChild(msgDiv);
            dialogueBox.scrollTop = dialogueBox.scrollHeight;
        }

        async function sendChoice() {
            const inputEl = document.getElementById('player-input');
            const sendBtn = document.getElementById('send-btn');
            const playerText = inputEl.value.trim();
            if(!playerText) return;

            inputEl.value = "";
            inputEl.style.height = "auto"; 
            inputEl.disabled = true;
            sendBtn.disabled = true;
            document.getElementById('loading').style.display = 'block';

            appendMessage("妳", playerText);
            chatScript.push(`妳：${playerText}`);
            
            await callAI();

            inputEl.disabled = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }

        async function callAI() {
            const url = `https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`;
            const fullPrompt = `${systemInstruction}\n\n【目前的無彩度劇本流水帳】\n${chatScript.join('\n\n')}\n\n【要求】\n請根據上述劇情，給出宮崎三高接下來的反應（妳必須現場即興隨機生成一段情境描述神態、動作，並與台詞交織，回應要展現妳原本沉穩禁慾與硬核 MT 的張力）：`;
            const requestBody = { contents: [{ role: "user", parts: [{ text: fullPrompt }] }] };

            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody) });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                if (data.usageMetadata && data.usageMetadata.totalTokenCount) { document.getElementById('ui-tokens').innerText = data.usageMetadata.totalTokenCount; }

                let reply = data.candidates[0].content.parts[0].text;
                
                const loveMatch = reply.match(/\[LOVE_CHANGE:\s*([+-]?\d+)\]/);
                if (loveMatch) {
                    lovePoints += parseInt(loveMatch[1]);
                    document.getElementById('ui-love').innerText = lovePoints;
                    reply = reply.replace(/\[LOVE_CHANGE:.*?\]/, '').trim();
                }
                
                reply = reply.replace(/^宮崎三高：/, '').replace(/^MT_Sanko：/, '').trim();
                chatScript.push(`宮崎三高：${reply}`);
                
                localStorage.setItem('sanko_chat_script', JSON.stringify(chatScript));
                localStorage.setItem('sanko_chat_love', lovePoints.toString());

                document.getElementById('loading').style.display = 'none';
                appendMessage("宮崎三高", reply);

            } catch (error) {
                console.error(error);
                document.getElementById('loading').style.display = 'none';
                alert("連線協議中斷：\n\n" + error.message);
                chatScript.pop(); 
            }
        }

        async function callAI_Persona(persona) {
            const url = `https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`;
            const fullPrompt = `${systemInstruction}\n\n${persona}`;
            const requestBody = { contents: [{ role: "user", parts: [{ text: fullPrompt }] }] };

            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody) });
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                let reply = data.candidates[0].content.parts[0].text;
                reply = reply.replace(/\[LOVE_CHANGE:.*?\]/, '').trim().replace(/^宮崎三高：/, '').trim();
                chatScript.push(`宮崎三高：${reply}`);
                appendMessage("宮崎三高", reply);
                localStorage.setItem('sanko_chat_script', JSON.stringify(chatScript));
                localStorage.setItem('sanko_chat_love', lovePoints.toString());
            } catch (error) { console.error(error); }
        }

        function clearSave() {
            if (confirm("妳確定要刪除本地端的無彩度回憶嗎？宮崎三高將不再記得妳。金鑰跟照片會保留。")) {
                localStorage.removeItem('sanko_chat_script');
                localStorage.removeItem('sanko_chat_love');
                alert("已清除本地存檔。網路將重新載入。");
                location.reload();
            }
        }
    </script>
</body>
</html>
